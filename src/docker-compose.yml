### `docker-compose.yml`
```yaml
version: '3.8'

services:
  assistant:
    build: .
    container_name: ai-assistant
    ports:
      - "5000:5000"
    volumes:
      - ./app:/app
      - ./data:/data
      - ./models:/models
    environment:
      - FLASK_ENV=production
      - MODEL_PATH=/models/rugpt3
      - KNOWLEDGE_BASE_PATH=/data/knowledge_base
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
